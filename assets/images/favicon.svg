<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#161E0F"/>
  <!-- connection lines -->
  <line x1="16" y1="16" x2="7"  y2="8"  stroke="#A6D95F" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
  <line x1="16" y1="16" x2="25" y2="8"  stroke="#A6D95F" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
  <line x1="16" y1="16" x2="7"  y2="24" stroke="#A6D95F" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
  <line x1="16" y1="16" x2="25" y2="24" stroke="#A6D95F" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
  <line x1="16" y1="16" x2="16" y2="6"  stroke="#6FE08A" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="16" x2="16" y2="26" stroke="#6FE08A" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- satellite nodes -->
  <circle cx="7"  cy="8"  r="2.2" fill="#6FE08A"/>
  <circle cx="25" cy="8"  r="2.2" fill="#6FE08A"/>
  <circle cx="7"  cy="24" r="2.2" fill="#6FE08A"/>
  <circle cx="25" cy="24" r="2.2" fill="#6FE08A"/>
  <circle cx="16" cy="6"  r="1.8" fill="#A6D95F" opacity="0.8"/>
  <circle cx="16" cy="26" r="1.8" fill="#A6D95F" opacity="0.8"/>
  <!-- center node -->
  <circle cx="16" cy="16" r="4" fill="#A6D95F"/>
  <circle cx="16" cy="16" r="2.2" fill="#0C1108"/>
</svg>
